services:
  postgres:
    image: postgres:18-alpine
    container_name: lotto-db
    environment:
      POSTGRES_USER: lotto
      POSTGRES_PASSWORD: password
      POSTGRES_DB: lotto_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
